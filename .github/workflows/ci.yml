name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs_config: ${{ steps.filter.outputs.docs_config }}
      source: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            source:
              - 'src/**'
              - 'desktop/**'
              - 'scripts/**'
              - 'package.json'
              - 'bun.lock'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'next.config.*'
              - 'postcss.config.*'
              - '.github/actions/**'
              - '.github/workflows/**'
              - 'release-please-config.json'
              - '.release-please-manifest.json'
            docs_config:
              - 'docs/**'
              - '*.md'
              - '.gitignore'
              - '.editorconfig'
              - '.prettier*'
              - '.npmrc'

  pr-metadata:
    if: github.event_name == 'pull_request'
    name: pr-metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pull-requests: read
    steps:
      - name: Validate semantic pull request title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false
          subjectPattern: .+
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert

  format:
    name: format
    needs: changes
    if: ${{ needs.changes.outputs.source == 'true' || needs.changes.outputs.docs_config == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Check formatting
        run: bun run format:check

  typecheck:
    name: typecheck
    needs: changes
    if: ${{ needs.changes.outputs.source == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Typecheck
        run: bun run typecheck

  test:
    name: test
    needs: changes
    if: ${{ needs.changes.outputs.source == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      SKIP_ENV_VALIDATION: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"
      SENTINEL_SKIP_STARTUP_TASKS: "1"
      SENTINEL_DB_PATH: ${{ github.workspace }}/.sentinel-ci/sentinel.db
      SENTINEL_STATE_PATH: ${{ github.workspace }}/.sentinel-ci/state.json
      ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run tests
        run: bun run test

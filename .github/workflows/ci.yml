name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-metadata:
    if: github.event_name == 'pull_request'
    name: pr-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: read
    steps:
      - name: Validate semantic pull request title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false
          subjectPattern: .+
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert

  format:
    name: format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Check formatting
        run: bun run format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Typecheck
        run: bun run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      SKIP_ENV_VALIDATION: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"
      SENTINEL_SKIP_STARTUP_TASKS: "1"
      SENTINEL_DB_PATH: ${{ github.workspace }}/.sentinel-ci/sentinel.db
      SENTINEL_STATE_PATH: ${{ github.workspace }}/.sentinel-ci/state.json
      ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run tests
        run: bun run test

  desktop-smoke:
    name: desktop-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      SKIP_ENV_VALIDATION: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"
      SENTINEL_SKIP_STARTUP_TASKS: "1"
      SENTINEL_DB_PATH: ${{ github.workspace }}/.sentinel-ci/sentinel.db
      SENTINEL_STATE_PATH: ${{ github.workspace }}/.sentinel-ci/state.json
      ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Linux desktop packaging smoke test
        run: bun run build:desktop:linux

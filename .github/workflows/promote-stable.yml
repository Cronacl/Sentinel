name: promote-stable

on:
  workflow_dispatch:
    inputs:
      alpha_tag:
        description: Existing alpha tag to promote, for example v0.2.5-alpha.1
        required: true
        type: string
      stable_version:
        description: Stable semver without a leading v, for example 0.2.5
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  GIT_AUTHOR_NAME: github-actions[bot]
  GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
  GIT_COMMITTER_NAME: github-actions[bot]

jobs:
  promote:
    name: promote
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: ./.github/actions/setup-bun

      - name: Prepare stable promotion branch
        run: |
          node ./scripts/release/prepare-stable-promotion.mjs \
            "${{ github.event.inputs.alpha_tag }}" \
            "${{ github.event.inputs.stable_version }}"

      - name: Create stable promotion pull request
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: release/stable-v${{ github.event.inputs.stable_version }}
          commit-message: "chore(release): promote v${{ github.event.inputs.stable_version }}"
          delete-branch: true
          title: "chore(release): promote v${{ github.event.inputs.stable_version }}"
          body: |
            Promote `${{ github.event.inputs.alpha_tag }}` to the stable `${{ github.event.inputs.stable_version }}` line.

            After merging this PR:
            - run the `publish-release` workflow for `v${{ github.event.inputs.stable_version }}` if the tag was created manually
            - merge or trigger the next alpha release PR on `main` to continue prerelease publishing

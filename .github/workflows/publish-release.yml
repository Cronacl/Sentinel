name: publish-release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.0.1
        required: true
        type: string

concurrency:
  group: publish-release-${{ github.event.inputs.release_tag || github.ref_name || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
  NODE_OPTIONS: "--max-old-space-size=4096"
  SENTINEL_DB_PATH: ${{ github.workspace }}/.sentinel-ci/sentinel.db
  SENTINEL_SKIP_STARTUP_TASKS: "1"
  SENTINEL_STATE_PATH: ${{ github.workspace }}/.sentinel-ci/state.json
  SKIP_ENV_VALIDATION: "1"

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      target_commitish: ${{ steps.resolve.outputs.target_commitish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TAG="$INPUT_RELEASE_TAG"
          else
            RELEASE_TAG="$REF_NAME"
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required" >&2
            exit 1
          fi

          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "release_tag must start with v" >&2
              exit 1
              ;;
          esac

          if ! git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Release tag $RELEASE_TAG does not exist." >&2
            exit 1
          fi

          TARGET_COMMITISH="$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "target_commitish=$TARGET_COMMITISH" >> "$GITHUB_OUTPUT"

      - name: Summarize release inputs
        run: |
          {
            echo "## Publish release"
            echo
            echo "- Tag: \`${{ steps.resolve.outputs.release_tag }}\`"
            echo "- Commit: \`${{ steps.resolve.outputs.target_commitish }}\`"
            echo "- Mode: release"
            echo "- Platforms: mac arm64, windows x64, linux x64, linux arm64"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build-${{ matrix.platform }}-${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            artifact_name: release-mac-arm64
            artifact_paths: |
              dist/*.dmg
              dist/*.blockmap
              dist/latest-mac.yml
            platform: mac
            runner: macos-latest
            script: build:desktop:mac:arm64
          - arch: x64
            artifact_name: release-windows
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
            platform: windows
            runner: windows-latest
            script: build:desktop:windows
          - arch: x64
            artifact_name: release-linux-x64
            artifact_paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.blockmap
              dist/latest-linux.yml
            platform: linux
            runner: ubuntu-24.04
            script: build:desktop:linux:x64
          - arch: arm64
            artifact_name: release-linux-arm64
            artifact_paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.blockmap
              dist/latest-linux-arm64.yml
            platform: linux
            runner: ubuntu-24.04-arm
            script: build:desktop:linux:arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - uses: ./.github/actions/setup-desktop-build

      - name: Configure macOS signing
        if: ${{ matrix.platform == 'mac' }}
        env:
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_SIGNING_CERT_BASE64_SECRET: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD_SECRET: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_SIGNING_CERT_BASE64_SECRET" ] || [ -z "$APPLE_SIGNING_CERT_PASSWORD_SECRET" ]; then
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            {
              echo "### macOS signing"
              echo
              echo "Signing secrets are not configured. Building an unsigned macOS artifact."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          node -e "const fs=require('fs'); fs.writeFileSync(process.argv[1], Buffer.from(process.argv[2], 'base64'))" \
            "$CERT_PATH" \
            "$APPLE_SIGNING_CERT_BASE64_SECRET"

          if ! openssl pkcs12 -in "$CERT_PATH" -nokeys -passin "pass:$APPLE_SIGNING_CERT_PASSWORD_SECRET" >/dev/null 2>&1; then
            echo "APPLE_SIGNING_CERT_BASE64 or APPLE_SIGNING_CERT_PASSWORD is invalid." >&2
            exit 1
          fi

          CERT_SUBJECT="$(
            openssl pkcs12 -in "$CERT_PATH" -clcerts -nokeys -passin "pass:$APPLE_SIGNING_CERT_PASSWORD_SECRET" 2>/dev/null \
              | openssl x509 -noout -subject 2>/dev/null
          )"

          case "$CERT_SUBJECT" in
            *"Developer ID Application:"*) ;;
            *)
              echo "The macOS signing certificate must be a Developer ID Application certificate." >&2
              echo "Resolved subject: ${CERT_SUBJECT:-<unknown>}" >&2
              exit 1
              ;;
          esac

          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$APPLE_SIGNING_CERT_PASSWORD_SECRET" >> "$GITHUB_ENV"

          if [ -n "$APPLE_ID_SECRET" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" ] && [ -n "$APPLE_TEAM_ID_SECRET" ]; then
            echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"

            {
              echo "### macOS signing"
              echo
              echo "Developer ID signing and notarization are enabled for this build."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### macOS signing"
              echo
              echo "Developer ID signing is enabled, but notarization secrets are incomplete."
              echo "Set \`APPLE_ID\`, \`APPLE_APP_SPECIFIC_PASSWORD\`, and \`APPLE_TEAM_ID\` to notarize the app."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate release tag against package version
        run: bun run release:version:check "${{ needs.prepare.outputs.release_tag }}"

      - name: Build ${{ matrix.platform }} desktop release
        run: bun run ${{ matrix.script }}

      - name: Rename Linux arm64 update metadata
        if: ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' }}
        shell: bash
        run: |
          if [ -f dist/latest-linux.yml ]; then
            mv dist/latest-linux.yml dist/latest-linux-arm64.yml
          fi

      - name: Upload ${{ matrix.platform }}-${{ matrix.arch }} artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          retention-days: 3

  publish:
    name: publish
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets
          pattern: release-*

      - name: Extract changelog release notes
        run: |
          node ./scripts/release/extract-changelog-section.mjs \
            "${{ needs.prepare.outputs.release_tag }}" \
            "$RUNNER_TEMP/release-notes.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ runner.temp }}/release-notes.md
          files: release-assets/**/*
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.target_commitish }}

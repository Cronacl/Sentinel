name: publish-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.2.5-alpha.1
        required: true
        type: string
      git_ref:
        description: Optional git ref to build from. Defaults to the release tag.
        required: false
        type: string

concurrency:
  group: publish-release-${{ github.event.inputs.release_tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
  NODE_OPTIONS: "--max-old-space-size=4096"
  SENTINEL_DB_PATH: ${{ github.workspace }}/.sentinel-ci/sentinel.db
  SENTINEL_SKIP_STARTUP_TASKS: "1"
  SENTINEL_STATE_PATH: ${{ github.workspace }}/.sentinel-ci/state.json
  SKIP_ENV_VALIDATION: "1"

jobs:
  prepare:
    name: prepare
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      git_ref: ${{ steps.resolve.outputs.git_ref }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      target_commitish: ${{ steps.resolve.outputs.target_commitish }}
    steps:
      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
          INPUT_GIT_REF: ${{ github.event.inputs.git_ref }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TAG="$INPUT_RELEASE_TAG"
            GIT_REF="${INPUT_GIT_REF:-$RELEASE_TAG}"
            TARGET_COMMITISH="${INPUT_GIT_REF:-$RELEASE_TAG}"
          else
            RELEASE_TAG="$REF_NAME"
            GIT_REF="$REF_NAME"
            TARGET_COMMITISH="$EVENT_SHA"
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required" >&2
            exit 1
          fi

          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "release_tag must start with v" >&2
              exit 1
              ;;
          esac

          if [[ "$RELEASE_TAG" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "git_ref=$GIT_REF" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "target_commitish=$TARGET_COMMITISH" >> "$GITHUB_OUTPUT"

  build:
    name: build-${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: release-mac
            artifact_paths: |
              dist/*.dmg
              dist/*.blockmap
              dist/latest-mac.yml
            os: macos-latest
            platform: mac
            script: build:desktop:mac
          - artifact_name: release-windows
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
            os: windows-latest
            platform: windows
            script: build:desktop:windows
          - artifact_name: release-linux
            artifact_paths: |
              dist/*.AppImage
              dist/*.blockmap
              dist/latest-linux.yml
            os: ubuntu-latest
            platform: linux
            script: build:desktop:linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.git_ref }}

      - uses: ./.github/actions/setup-bun

      - name: Validate release tag against package version
        run: bun run release:version:check "${{ needs.prepare.outputs.release_tag }}"

      - name: Build ${{ matrix.platform }} desktop release
        run: bun run ${{ matrix.script }}

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}

  publish:
    name: publish
    needs:
      - prepare
      - build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets
          pattern: release-*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.target_commitish }}

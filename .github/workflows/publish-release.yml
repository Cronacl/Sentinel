name: publish-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.2.5-alpha.1
        required: true
        type: string
      git_ref:
        description: Optional git ref to build from. Defaults to the release tag.
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.2.5-alpha.1
        required: true
        type: string
      git_ref:
        description: Optional git ref to build from. Defaults to the release tag.
        required: false
        type: string

concurrency:
  group: publish-release-${{ inputs.release_tag || github.event.inputs.release_tag || github.ref_name || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
  NODE_OPTIONS: "--max-old-space-size=4096"
  SENTINEL_DB_PATH: ${{ github.workspace }}/.sentinel-ci/sentinel.db
  SENTINEL_SKIP_STARTUP_TASKS: "1"
  SENTINEL_STATE_PATH: ${{ github.workspace }}/.sentinel-ci/state.json
  SKIP_ENV_VALIDATION: "1"

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-24.04
    outputs:
      git_ref: ${{ steps.resolve.outputs.git_ref }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      target_commitish: ${{ steps.resolve.outputs.target_commitish }}
    steps:
      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SHA: ${{ github.sha }}
          INPUT_GIT_REF: ${{ inputs.git_ref || github.event.inputs.git_ref }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || github.event.inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "workflow_call" ]; then
            RELEASE_TAG="$INPUT_RELEASE_TAG"
            GIT_REF="${INPUT_GIT_REF:-$RELEASE_TAG}"
            TARGET_COMMITISH="${INPUT_GIT_REF:-$RELEASE_TAG}"
          else
            RELEASE_TAG="$REF_NAME"
            GIT_REF="$REF_NAME"
            TARGET_COMMITISH="$EVENT_SHA"
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required" >&2
            exit 1
          fi

          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "release_tag must start with v" >&2
              exit 1
              ;;
          esac

          if [[ "$RELEASE_TAG" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "git_ref=$GIT_REF" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "target_commitish=$TARGET_COMMITISH" >> "$GITHUB_OUTPUT"

      - name: Summarize release inputs
        run: |
          if [ "${{ steps.resolve.outputs.prerelease }}" = "true" ]; then
            MODE="prerelease"
          else
            MODE="stable"
          fi

          {
            echo "## Publish release"
            echo
            echo "- Tag: \`${{ steps.resolve.outputs.release_tag }}\`"
            echo "- Ref: \`${{ steps.resolve.outputs.git_ref }}\`"
            echo "- Mode: $MODE"
            echo "- Platforms: mac, windows, linux"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build-${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: release-mac
            artifact_paths: |
              dist/*.dmg
              dist/*.blockmap
              dist/latest-mac.yml
            platform: mac
            runner: macos-latest
            script: build:desktop:mac
          - artifact_name: release-windows
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
            platform: windows
            runner: windows-latest
            script: build:desktop:windows
          - artifact_name: release-linux
            artifact_paths: |
              dist/*.AppImage
              dist/*.blockmap
              dist/latest-linux.yml
            platform: linux
            runner: ubuntu-24.04
            script: build:desktop:linux
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.git_ref }}

      - uses: ./.github/actions/setup-bun

      - name: Configure macOS signing
        if: ${{ matrix.platform == 'mac' }}
        env:
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_SIGNING_CERT_BASE64_SECRET: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD_SECRET: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

          if [ -z "$APPLE_SIGNING_CERT_BASE64_SECRET" ] || [ -z "$APPLE_SIGNING_CERT_PASSWORD_SECRET" ]; then
            {
              echo "### macOS signing"
              echo
              echo "Signing secrets are not configured. Building an unsigned macOS artifact."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "CSC_LINK=$APPLE_SIGNING_CERT_BASE64_SECRET" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$APPLE_SIGNING_CERT_PASSWORD_SECRET" >> "$GITHUB_ENV"

          if [ -n "$APPLE_ID_SECRET" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" ] && [ -n "$APPLE_TEAM_ID_SECRET" ]; then
            echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"

            {
              echo "### macOS signing"
              echo
              echo "Developer ID signing and notarization are enabled for this build."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### macOS signing"
              echo
              echo "Developer ID signing is enabled, but notarization secrets are incomplete."
              echo "Set \`APPLE_ID\`, \`APPLE_APP_SPECIFIC_PASSWORD\`, and \`APPLE_TEAM_ID\` to notarize the app."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate release tag against package version
        run: bun run release:version:check "${{ needs.prepare.outputs.release_tag }}"

      - name: Build ${{ matrix.platform }} desktop release
        run: bun run ${{ matrix.script }}

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}

  publish:
    name: publish
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets
          pattern: release-*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.target_commitish }}

name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-24.04
    steps:
      - name: Require release automation token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_PLEASE_TOKEN" ]; then
            echo "RELEASE_PLEASE_TOKEN is required." >&2
            echo "The default GITHUB_TOKEN can create the release PR and tag, but tags created with GITHUB_TOKEN do not trigger downstream workflows like publish-release." >&2
            exit 1
          fi

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.1.0-alpha.1
        required: true
        type: string
      git_ref:
        description: Optional git ref to build from. Defaults to main.
        default: main
        required: false
        type: string

concurrency:
  group: release-${{ github.event.inputs.release_tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      git_ref: ${{ steps.resolve.outputs.git_ref }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_GIT_REF: ${{ github.event.inputs.git_ref }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TAG="$INPUT_RELEASE_TAG"
            GIT_REF="${INPUT_GIT_REF:-main}"
          else
            RELEASE_TAG="$REF_NAME"
            GIT_REF="$REF_NAME"
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag is required" >&2
            exit 1
          fi

          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "release_tag must start with v" >&2
              exit 1
              ;;
          esac

          if [[ "$RELEASE_TAG" == *-alpha.* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "git_ref=$GIT_REF" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: release-mac
            artifact_paths: |
              dist/*.dmg
              dist/*.blockmap
              dist/latest-mac.yml
            os: macos-latest
            platform: mac
            script: build:desktop:mac
          - artifact_name: release-windows
            artifact_paths: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
            os: windows-latest
            platform: win
            script: build:desktop:windows
          - artifact_name: release-linux
            artifact_paths: |
              dist/*.AppImage
              dist/*.blockmap
              dist/latest-linux.yml
            os: ubuntu-latest
            platform: linux
            script: build:desktop:linux
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      SKIP_ENV_VALIDATION: "1"
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.git_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 21.7.3

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release tag against package version
        run: node ./scripts/release/validate-release-version.mjs "${{ needs.prepare.outputs.release_tag }}"

      - name: Build ${{ matrix.platform }} desktop release
        run: bun run ${{ matrix.script }}

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_paths }}

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-assets
          pattern: release-*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ needs.prepare.outputs.git_ref }}

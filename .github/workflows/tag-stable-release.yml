name: tag-stable-release

on:
  push:
    branches:
      - main

concurrency:
  group: tag-stable-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    name: tag
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      release_tag: ${{ steps.detect.outputs.release_tag }}
      should_tag: ${{ steps.detect.outputs.should_tag }}
      stable_version: ${{ steps.detect.outputs.stable_version }}
      target_sha: ${{ steps.detect.outputs.target_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - id: detect
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          RANGE="$EVENT_BEFORE..$EVENT_SHA"
          if [ "$EVENT_BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="$EVENT_SHA"
          fi

          MATCH="$(git log --format='%H%x09%s' "$RANGE" | sed -nE 's/^([0-9a-f]+)[[:space:]]chore\(release\): promote v([0-9]+\.[0-9]+\.[0-9]+)$/\1 \2/p' | head -n 1)"

          if [ -z "$MATCH" ]; then
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TARGET_SHA="${MATCH%% *}"
          VERSION="${MATCH##* }"

          echo "should_tag=true" >> "$GITHUB_OUTPUT"
          echo "stable_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

      - name: Validate stable promotion state
        if: ${{ steps.detect.outputs.should_tag == 'true' }}
        run: node ./scripts/release/validate-stable-promotion.mjs "${{ steps.detect.outputs.stable_version }}" "${{ steps.detect.outputs.target_sha }}"

      - name: Create missing stable tag
        if: ${{ steps.detect.outputs.should_tag == 'true' }}
        env:
          RELEASE_TAG: ${{ steps.detect.outputs.release_tag }}
          TARGET_SHA: ${{ steps.detect.outputs.target_sha }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG" >/dev/null; then
            echo "Tag $RELEASE_TAG already exists; skipping."
            exit 0
          fi

          git tag "$RELEASE_TAG" "$TARGET_SHA"
          git push origin "refs/tags/$RELEASE_TAG"
